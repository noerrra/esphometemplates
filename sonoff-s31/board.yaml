# Allow importing this package
dashboard_import:
  package_import_url: 'github://noerrra/esphometemplates/sonoff-s31/board.yaml@main'
  import_full_config: false

esp8266:
  board: esp12e
  early_pin_init: false
  restore_from_flash: false

# Enable logging
logger:
  baud_rate: 0

uart:
  rx_pin: RX
  baud_rate: 4800
  parity: EVEN

status_led:
  pin:
    number: GPIO13
    inverted: yes
