# ESPHome firmware template for Sonoff S3 Outlet
# https://devices.esphome.io/devices/sonoff-s31/

substitutions:
  # Required import substitutions
  device_site: 'home'
  device_location_code: 'bedroom01'
  device_location_name: 'Bedroom 1'
  device_type_code: 'outl'
  device_type_name: 'Outlet'
  device_number: '000'
  device_ip: 'xxx.thenoerrs.com'

  # Project Substitutions (not intended for user substitution)
  device_model: 'Sonoff s31'
  device_make: 'Sonoff'
  package_version: '2026-05-29'
  package_url: 'github://noerrra/esphometemplates/sonoff-s31.yaml@main'

# Allow importing this package
dashboard_import:
  package_import_url: ${package_url}
  import_full_config: false

# Import packages
packages:
  standard_package:
    url: https://github.com/noerrra/esphometemplates/
    ref: main
    refresh: 0d
    files:
      - standard/project.yaml
      - standard/diagnostics.yaml
      - standard/wifi.yaml
  sonoff_package:
    url: https://github.com/noerrra/esphometemplates/
    ref: main
    refresh: 0d
    files:
      - sonoff-s31/board.yaml
      - sonoff-s31/switch.yaml
      - sonoff-s31/power-monitoring.yaml