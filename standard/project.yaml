# NOTE: This file is not a stand-alone package. It is part of
# a 'root' device template and expects the substitutions that
# are hereby referenced to be defined by its parent.

substitutions:
  # Generated name and unique device id for the device
  # Not intended for user substitutions
  device_name: "${device_location_name} - ${device_type_name} - ${device_number}"
  device_code: "${device_site}-${device_location_code}-${device_type_code}-${device_number}"

# Define a global variable for CPU speed
globals:
  - id: cpu_speed
    type: int
    restore_value: no
    initial_value: "0"

# Setup the integration and define some project variables
esphome:
  name: "${device_code}"
  friendly_name: "${device_name}"
  comment: "${device_model} by ${device_make}"
  name_add_mac_suffix: false
  min_version: "2023.2.0"
  project:
    name: "${device_make}.${device_model}"
    version: "${package_version}"

text_sensor:
  # Show firmware template version
  - platform: template
    name: "Deployment Version"
    lambda: return {"${package_version}"};
    disabled_by_default: false
    icon: "mdi:tag"
    entity_category: diagnostic

sensor:
  - platform: template
    name: "CPU Frequency"
    unit_of_measurement: "MHz"
    icon: "mdi:cpu-64-bit"
    update_interval: 60s
    entity_category: "diagnostic"
    lambda: |-
      #if defined(USE_ESP32)
        #if defined(USE_ESP_IDF)
          // ESPHome globally includes sdkconfig.h, so these macros are always available
          #if defined(CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ)
            return (float)CONFIG_ESP_DEFAULT_CPU_FREQ_MHZ; // ESP-IDF v5+
          #elif defined(CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ)
            return (float)CONFIG_ESP32_DEFAULT_CPU_FREQ_MHZ; // Standard ESP32
          #elif defined(CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ)
            return (float)CONFIG_ESP32S2_DEFAULT_CPU_FREQ_MHZ; // ESP32-S2
          #elif defined(CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ)
            return (float)CONFIG_ESP32S3_DEFAULT_CPU_FREQ_MHZ; // ESP32-S3
          #elif defined(CONFIG_ESP32C3_DEFAULT_CPU_FREQ_MHZ)
            return (float)CONFIG_ESP32C3_DEFAULT_CPU_FREQ_MHZ; // ESP32-C3
          #else
            return 0.0; // Unknown IDF configuration
          #endif
        #else
          // Arduino framework on ESP32
          return (float)getCpuFreqMHz();
        #endif
      #elif defined(USE_ESP8266)
        // ESP8266 framework
        return (float)ESP.getCpuFreqMHz();
      #else
        // Fallback for other chips
        return 0.0;
      #endif