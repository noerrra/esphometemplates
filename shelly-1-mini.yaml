# ESPHome firmware template for Shelly Dimmer1

substitutions:
  # Required import substitutions
  device_site: 'home'
  device_location_code: 'unk'
  device_location_name: 'unknown'
  device_type_code: 'shelly1m'
  device_type_name: 'Shell 1 Mini'
  device_number: '000'
  device_ip: 'unk.thenoerrs.com'

  # Project Substitutions (not intended for user substitution)
  device_model: 'Shelly1 Mini Gen3'
  device_make: 'Shelly'
  package_version: '2026-06-07'
  package_url: 'github://noerrra/esphometemplates/shelly-1-mini.yaml@main'

# Allow importing this package
dashboard_import:
  package_import_url: ${package_url}
  import_full_config: false

# Import packages
packages:
  standard_package:
    url: https://github.com/noerrra/esphometemplates/
    ref: main
    refresh: 0d
    files:
      - standard/project.yaml
      - standard/diagnostics.yaml
      - standard/wifi.yaml
  shelly_package:
    url: https://github.com/noerrra/esphometemplates/
    ref: main
    refresh: 0d
    files:
      - shelly-1-mini/board.yaml
      - shelly-1-mini/switches.yaml